repos:
  # Black - code formatting
  - repo: local
    hooks:
      - id: black
        name: black
        entry: ./.venv/bin/black
        language: system
        types: [python]

      # Fast structural test gate for skill content changes
      - id: pytest-skills
        name: pytest-skills
        entry: ./.venv/bin/pytest tests/test_skills.py -q
        language: system
        pass_filenames: false

      # Full test suite before push to avoid CI-only surprises
      - id: pytest-all
        name: pytest-all
        entry: ./.venv/bin/pytest tests/ -q
        language: system
        pass_filenames: false
        stages: [pre-push]
  # isort - import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Ruff - linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # MyPy - type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0.0
          - types-requests
          - types-PyYAML
        args: [--config-file=pyproject.toml, --follow-imports=skip]
        language_version: python
