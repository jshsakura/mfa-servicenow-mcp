# ServiceNow MCP Tool Packages Configuration
#
# Default: standard (safe mode - all reads, no writes)
# All other packages inherit standard's read tools and add domain-specific writes.
# Tools not in any package (Agile/PPM, User/Group, Knowledge) → use sn_query.

none: []

# --- Safe Mode: Read-only across all domains ---
standard:
  # Core
  - sn_health
  - sn_query
  - sn_aggregate
  - sn_schema
  - sn_discover
  - sn_nl
  # Incident (Read)
  - get_incident_by_number
  # Catalog (Read)
  - list_catalog_items
  - get_catalog_item
  - list_catalog_categories
  - list_catalog_item_variables
  - get_optimization_recommendations
  # Change Management (Read)
  - get_change_request_details
  # Changeset (Read)
  - get_changeset_details
  # Legacy Workflow (Read)
  - list_legacy_workflows
  - get_legacy_workflow_details
  # Flow Designer (Read)
  - list_flow_designers
  - get_flow_designer_detail
  - get_flow_designer_executions
  # Portal (Read)
  - get_portal
  - get_page
  - get_widget_bundle
  - get_portal_component_code
  - get_widget_instance
  - download_portal_sources
  - search_portal_regex_matches
  - trace_portal_route_targets
  - detect_angular_implicit_globals
  - get_provider_dependency_map
  - analyze_widget_performance
  - extract_widget_table_dependencies
  # Script Include (Read)
  - list_script_includes
  - get_script_include
  # Developer Productivity (Read)
  - get_developer_changes
  - audit_pending_changes
  - get_repo_change_report
  # Logs
  - get_system_logs
  - get_journal_entries
  - get_transaction_logs
  - get_background_script_logs
  # Search & Analysis
  - search_server_code
  - get_metadata_source
  - extract_table_dependencies
  # Detection
  - detect_missing_profit_company_codes
  # Local Sync (Read)
  - diff_local_component

