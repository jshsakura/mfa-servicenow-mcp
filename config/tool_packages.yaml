# ServiceNow MCP Tool Packages Configuration
#
# Packages:
#   none               — Disabled profile for intentionally turning tools off.
#   core               — Minimal read-only essentials.
#   standard           — Broad read-only surface. Default.
#   service_desk       — standard + operational incident/change writes.
#   portal_developer   — standard + portal/changeset/script/local-sync writes.
#   platform_developer — standard + workflow/incident/change/script writes.
#   full               — Broadest packaged surface, including bundled manage_* flows.
#
# All write-capable packages use _extends: standard to avoid duplication.
# Some registered tools are intentionally left unpackaged; see docs/TOOL_INVENTORY.md.

none: []

# --- Core: minimal read-only essentials ---
core:
  - sn_health
  - sn_query
  - sn_aggregate
  - sn_schema
  - sn_discover
  - sn_nl
  - sn_resolve_url
  - manage_catalog
  - manage_workflow
  - list_flow_designers
  - get_portal
  - get_page
  - get_logs
  - search_server_code
  - manage_script_include

# --- Safe Mode: Read-only across all domains ---
standard:
  # Core
  - sn_health
  - sn_query
  - sn_aggregate
  - sn_schema
  - sn_discover
  - sn_nl
  - sn_resolve_url
  # Catalog (Read)
  - manage_catalog
  # Change Management (Read)
  # Workflow (Read)
  - manage_workflow
  # Flow Designer (Read)
  - list_flow_designers
  - get_flow_designer_detail
  - get_flow_designer_executions
  - compare_flows
  # Portal (Read)
  - get_portal
  - get_page
  - get_widget_bundle
  - get_portal_component_code
  - get_widget_instance
  - download_portal_sources
  - search_portal_regex_matches
  - trace_portal_route_targets
  - detect_angular_implicit_globals
  - get_provider_dependency_map
  - analyze_widget_performance
  - extract_widget_table_dependencies
  - resolve_widget_chain
  - resolve_page_dependencies
  # Script Include (Read)
  - manage_script_include
  # Developer Productivity (Read)
  - get_developer_changes
  - audit_pending_changes
  - get_repo_change_report
  # Logs
  - get_logs
  # Search & Analysis
  - search_server_code
  - get_metadata_source
  - extract_table_dependencies
  - download_app_sources
  - download_script_includes
  - download_server_scripts
  - download_ui_components
  - download_api_sources
  - download_security_sources
  - download_admin_scripts
  - download_table_schema
  - audit_local_sources
  # Local Sync (Read)
  - diff_local_component

# --- Portal Developer: standard + portal/changeset/script writes ---
portal_developer:
  _extends: standard
  _tools:
    # Bundled (Phase 3)
    - manage_changeset
    - manage_script_include
    - manage_portal_layout
    - manage_portal_component
    # Portal writes
    - route_portal_component_edit
    - analyze_portal_component_update
    - create_portal_component_snapshot
    - preview_portal_component_update
    - update_portal_component_from_snapshot
    # Portal CRUD (Page/Layout)
    - scaffold_page
    # Local Sync writes
    - update_remote_from_local

# --- Platform Developer: standard + workflow/incident/change/script writes ---
platform_developer:
  _extends: standard
  _tools:
    # Flow Designer writes
    - update_flow_designer
    # UI Policy writes
    # Portal CRUD
    - scaffold_page
    # Bundled (Phase 2 + 3)
    - manage_incident
    - manage_change
    - manage_workflow
    - manage_script_include
    - manage_changeset
    - manage_ui_policy
    - manage_portal_layout
    - manage_portal_component
    # Incident writes — manage_incident covers create/update/comment/resolve
    # Change Management orchestrators (manage_change covers create/update/add_task)
    - submit_change_for_approval
    # Local Sync writes
    - update_remote_from_local

# --- Service Desk: standard + incident writes ---
service_desk:
  _extends: standard
  _tools:
    # Bundled (Phase 2 — manage_incident covers create/update/comment/resolve)
    - manage_incident

# --- Full: all tools ---
full:
  _extends: standard
  _tools:
    # Generic write primitive (denylisted sys_* internally)
    - sn_write
    # Bundled CRUD (Phase 2 + 3 — preferred surface)
    - manage_incident
    - manage_change
    - manage_kb_article
    - manage_changeset
    - manage_script_include
    - manage_workflow
    - manage_user
    - manage_group
    - manage_catalog
    - manage_portal_layout
    - manage_portal_component
    - manage_ui_policy
    # Change Management orchestrators (manage_change covers create/update/add_task)
    - submit_change_for_approval
    - approve_change
    - reject_change
    # Flow Designer writes
    - update_flow_designer
    # Portal writes
    - route_portal_component_edit
    - analyze_portal_component_update
    - create_portal_component_snapshot
    - preview_portal_component_update
    - update_portal_component_from_snapshot
    # Portal CRUD
    - scaffold_page
    # UI Policy writes
    # Local Sync writes
    - update_remote_from_local
