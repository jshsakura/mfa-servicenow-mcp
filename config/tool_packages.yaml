# ServiceNow MCP Tool Packages Configuration
#
# Packages use _extends to inherit from a parent package:
#   child_package:
#     _extends: parent_package
#     _tools:
#       - extra_tool_1
#
# Default: standard (safe read-only mode)

none: []

# --- Standard: Read-only across all domains (base for all other packages) ---
standard:
  # Core API
  - sn_health
  - sn_query
  - sn_aggregate
  - sn_schema
  - sn_discover
  - sn_nl
  # Incident (Read)
  - get_incident_by_number
  # Catalog (Read)
  - list_catalog_items
  - get_catalog_item
  - list_catalog_categories
  - list_catalog_item_variables
  # Change Management (Read)
  - get_change_request_details
  # Changeset (Read)
  - get_changeset_details
  # Workflow (Read)
  - list_workflows
  - get_workflow_details
  - list_workflow_versions
  - get_workflow_activities
  # Flow Designer (Read)
  - list_flow_designers
  - get_flow_designer_detail
  - get_flow_designer_executions
  - list_flow_triggers_by_table
  # Actions / Playbooks / Decision Tables (Read)
  - list_actions
  - get_action_detail
  - list_playbooks
  - get_playbook_detail
  - list_decision_tables
  - get_decision_table_detail
  # Portal (Read - basics)
  - get_portal
  - get_page
  - get_widget_bundle
  - get_portal_component_code
  - get_widget_instance
  # Script Include (Read)
  - list_script_includes
  - get_script_include
  # Logs & Search
  - get_logs
  - search_server_code
  - get_metadata_source
  - extract_table_dependencies
  # Developer Productivity
  - get_developer_changes
  - audit_pending_changes
  - get_repo_change_report
  # Local Sync (Read)
  - diff_local_component

# --- Service Desk: standard + incident/change writes ---
service_desk:
  _extends: standard
  _tools:
    # Incident writes
    - create_incident
    - update_incident
    - add_comment
    - resolve_incident
    # Change Management writes
    - create_change_request
    - update_change_request
    - add_change_task
    - submit_change_for_approval
    - approve_change
    - reject_change

# --- Portal Developer: standard + portal/source/changeset domain ---
portal_developer:
  _extends: standard
  _tools:
    # Portal analysis
    - download_portal_sources
    - search_portal_regex_matches
    - trace_portal_route_targets
    - detect_angular_implicit_globals
    - get_provider_dependency_map
    - analyze_widget_performance
    - extract_widget_table_dependencies
    - resolve_widget_chain
    - resolve_page_dependencies
    # Portal writes
    - route_portal_component_edit
    - analyze_portal_component_update
    - create_portal_component_snapshot
    - preview_portal_component_update
    - update_portal_component
    - update_portal_component_from_snapshot
    - create_widget_instance
    - update_widget_instance
    # Portal CRUD
    - create_widget
    - create_angular_provider
    - create_header_footer
    - create_css_theme
    - create_ng_template
    - create_ui_page
    - create_page
    - update_page
    - create_container
    - create_row
    - create_column
    - scaffold_page
    # Script Include writes
    - create_script_include
    - update_script_include
    # Changeset writes
    - create_changeset
    - update_changeset
    - add_file_to_changeset
    - commit_changeset
    - publish_changeset
    # Local Sync writes
    - update_remote_from_local
    - audit_local_sources
    # Source downloads
    - download_app_sources
    - download_script_includes
    - download_server_scripts
    - download_ui_components
    - download_api_sources
    - download_security_sources
    - download_admin_scripts
    - download_table_schema
    # Detection
    - detect_missing_profit_company_codes
    # Dev extras
    - get_uncommitted_changes
    - get_developer_daily_summary

# --- Platform Developer: standard + workflow/flow/script/incident/change ---
platform_developer:
  _extends: standard
  _tools:
    # Workflow writes
    - create_workflow
    - update_workflow
    - activate_workflow
    - deactivate_workflow
    - add_workflow_activity
    - update_workflow_activity
    - delete_workflow_activity
    - reorder_workflow_activities
    - delete_workflow
    # Flow Designer writes
    - update_flow_designer
    - activate_flow_designer
    - deactivate_flow_designer
    # UI Policy writes
    - create_ui_policy
    - create_ui_policy_action
    # Script Include writes (full)
    - create_script_include
    - update_script_include
    - delete_script_include
    - execute_script_include
    # Incident writes
    - create_incident
    - update_incident
    - add_comment
    - resolve_incident
    # Change Management writes
    - create_change_request
    - update_change_request
    - add_change_task
    - submit_change_for_approval
    - approve_change
    - reject_change
    # Changeset writes
    - create_changeset
    - update_changeset
    - add_file_to_changeset
    - commit_changeset
    - publish_changeset
    # Local Sync writes
    - update_remote_from_local
    - audit_local_sources
    # Source downloads
    - download_app_sources
    - download_script_includes
    - download_server_scripts
    - download_ui_components
    - download_api_sources
    - download_security_sources
    - download_admin_scripts
    - download_table_schema

# --- Agile: standard + PPM (Epic/Story/Scrum/Project) ---
agile:
  _extends: standard
  _tools:
    - create_epic
    - update_epic
    - list_epics
    - create_story
    - update_story
    - list_stories
    - list_story_dependencies
    - create_story_dependency
    - delete_story_dependency
    - create_scrum_task
    - update_scrum_task
    - list_scrum_tasks
    - create_project
    - update_project
    - list_projects

# --- Admin: standard + user/group/knowledge/catalog management ---
admin:
  _extends: standard
  _tools:
    # User management
    - create_user
    - update_user
    - get_user
    - list_users
    - create_group
    - update_group
    - list_groups
    - add_group_members
    - remove_group_members
    # Knowledge Base
    - create_knowledge_base
    - list_knowledge_bases
    - create_category
    - list_categories
    - create_article
    - update_article
    - publish_article
    - list_articles
    - get_article
    # Catalog management
    - create_catalog_category
    - update_catalog_category
    - move_catalog_items
    - update_catalog_item
    - create_catalog_item_variable
    - update_catalog_item_variable
    - get_optimization_recommendations

