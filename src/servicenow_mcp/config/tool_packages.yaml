# ServiceNow MCP Tool Packages Configuration
#
# Packages:
#   none               — Disabled profile for intentionally turning tools off.
#   core               — Minimal read-only essentials.
#   standard           — Broad read-only surface. Default.
#   service_desk       — standard + operational incident/change writes.
#   portal_developer   — standard + portal/changeset/script/local-sync writes.
#   platform_developer — standard + workflow/incident/change/script writes.
#   full               — Broadest packaged surface, including bundled manage_* flows.
#
# All write-capable packages use _extends: standard to avoid duplication.
# Some registered tools are intentionally left unpackaged; see docs/TOOL_INVENTORY.md.

none: []

# --- Core: minimal read-only essentials ---
# Must stay a strict subset of standard. Tools removed from standard
# (manage_catalog, get_portal) are removed here too.
core:
  - sn_health
  - sn_query
  - sn_aggregate
  - sn_schema
  - sn_discover
  - sn_resolve_url
  - manage_workflow:
      actions: [list, get_activities]
  - manage_flow_designer:
      actions: [list]
  - get_page
  - get_logs
  - search_server_code
  - manage_script_include:
      actions: [list, get]

# --- Safe Mode: Read-only across all domains ---
# manage_* tools listed here use an explicit `actions` allowlist so write
# actions are hidden from the LLM in this profile. Higher profiles re-list
# them as plain strings to expose the full action surface.
# Tools that aren't here (manage_incident / manage_change / etc.) stay out
# of standard entirely — read access for those domains uses generic sn_query.
standard:
  # Core
  - sn_health
  - sn_query
  - sn_aggregate
  - sn_schema
  - sn_discover
  - sn_resolve_url
  # Workflow (Read) — narrow to actually-used actions
  - manage_workflow:
      actions: [list, get_activities]
  # Flow Designer (Read) — unified tool, write actions blocked here
  - manage_flow_designer:
      actions: [list, get_detail, get_executions, get_action_source]
  # Portal (Read)
  - get_page
  - get_widget_bundle
  - get_portal_component_code
  - get_widget_instance
  - download_portal_sources
  - search_portal_regex_matches
  - trace_portal_route_targets
  - analyze_widget_performance
  # Widget dependency/provider graph (read) — write actions exposed in
  # portal_developer/full. Absorbed get_provider_dependency_map +
  # resolve_widget_chain + resolve_page_dependencies (now internal resolvers).
  - manage_widget_dependency:
      actions: [list, get]
  # Script Include (Read)
  - manage_script_include:
      actions: [list, get]
  # Developer Productivity (Read)
  - get_developer_changes
  # Logs
  - get_logs
  # Search & Analysis
  - search_server_code
  - get_metadata_source
  - extract_table_dependencies
  - download_app_sources
  - audit_local_sources
  # Attachments (Read) — download a record's attachment file(s) to local disk
  - download_attachment
  # Local Sync (Read)
  - diff_local_component

# --- Portal Developer: portal + flow designer + custom app writes ---
portal_developer:
  _extends: standard
  _tools:
    # Bundled CRUD
    - manage_changeset
    - manage_session_context
    - manage_script_include
    - manage_portal_layout
    - manage_portal_component
    - manage_widget_dependency
    - manage_workflow
    - manage_catalog
    - manage_ui_policy
    # Portal debugging (specialized read — needed by provider-audit/portal-diagnosis skills)
    - detect_angular_implicit_globals
    # Portal writes
    - route_portal_component_edit
    - analyze_portal_component_update
    - preview_portal_component_update
    # Portal CRUD (Page/Layout)
    - scaffold_page
    # Flow Designer — full action surface (read+update+edit workflow)
    - manage_flow_designer
    # Local Sync writes
    - update_remote_from_local

# --- Platform Developer: standard + workflow/incident/change/script writes ---
platform_developer:
  _extends: standard
  _tools:
    # Flow Designer — full action surface
    - manage_flow_designer
    # UI Policy writes
    # Portal CRUD
    - scaffold_page
    # Bundled (Phase 2 + 3)
    - manage_incident
    - manage_change
    - manage_workflow
    - manage_script_include
    - manage_changeset
    - manage_session_context
    - manage_ui_policy
    - manage_portal_layout
    - manage_portal_component
    # Incident writes — manage_incident covers create/update/comment/resolve
    # Change Management orchestrators (manage_change covers create/update/add_task)
    - submit_change_for_approval
    # Local Sync writes
    - update_remote_from_local
    # Domain-targeted source dumps (rare, kept for explicit upgrade)
    - download_sources
    - download_table_schema

# --- Service Desk: standard + incident writes ---
service_desk:
  _extends: standard
  _tools:
    # Bundled (Phase 2 — manage_incident covers create/update/comment/resolve)
    - manage_incident
    # Catalog browsing is part of service desk surface
    - manage_catalog:
        actions: [list_items, get_item, list_categories, list_item_variables]

# --- Full: all tools ---
full:
  _extends: standard
  _tools:
    # Generic write primitive (denylisted sys_* internally)
    - sn_write
    # Bundled CRUD (Phase 2 + 3 — preferred surface)
    - manage_incident
    - manage_change
    - manage_kb_article
    - manage_changeset
    - manage_script_include
    - manage_workflow
    - manage_user
    - manage_group
    - manage_catalog
    - manage_session_context
    - manage_portal_layout
    - manage_portal_component
    - manage_widget_dependency
    - manage_ui_policy
    # Change Management orchestrators (manage_change covers create/update/add_task)
    - submit_change_for_approval
    - approve_change
    - reject_change
    # Flow Designer — full action surface
    - manage_flow_designer
    # Portal debugging (specialized read — moved out of standard)
    - detect_angular_implicit_globals
    # Portal writes
    - route_portal_component_edit
    - analyze_portal_component_update
    - preview_portal_component_update
    # Portal CRUD
    - scaffold_page
    # UI Policy writes
    # Local Sync writes
    - update_remote_from_local
    # Portal entry (rare; get_page covers most cases)
    - get_portal
    # Domain-targeted source dumps
    - download_sources
    - download_table_schema
    # Audit / change reports (rare)
    - audit_pending_changes
    - get_repo_change_report
