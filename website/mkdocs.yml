repo_name: jshsakura/mfa-servicenow-mcp
repo_url: https://github.com/jshsakura/mfa-servicenow-mcp
edit_uri: edit/main/docs/

# Extensions to make the content look professional
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [".."] # To allow including README.md from root
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

# Hooks to rewrite language links for MkDocs site
hooks:
  - hooks/rewrite_links.py

# Navigation structure - mapping to existing docs
nav:
  - Home: index.md
  - Getting Started:
      - AI-Assisted Setup: docs/llm-setup.md
      - Client Setup: docs/CLIENT_SETUP.md
      - Windows Installation: docs/WINDOWS_INSTALL.md
  - Features & Tools:
      - Tool Inventory: docs/TOOL_INVENTORY.md
      - Tool Packages (Advanced): docs/TOOL_PACKAGES.md
  - Guides:
      - Service Catalog: docs/catalog.md
      - Change Management: docs/change_management.md
      - Workflow & Flow Designer: docs/workflow_management.md
