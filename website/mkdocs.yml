site_name: MFA ServiceNow MCP
site_description: MFA-first ServiceNow MCP server for LLMs (Claude, OpenAI, etc.)
site_author: jshsakura
site_url: https://jshsakura.github.io/mfa-servicenow-mcp/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  favicon: assets/favicon.png
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

# Plugins for enhanced beauty and functionality
plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: ko
          name: 한국어
          build: true
          nav_translations:
            Home: 홈
            Getting Started: 시작하기
            Client Setup: 클라이언트 설정
            Windows Installation: 윈도우 설치
            Features & Tools: 기능 및 도구
            Tool Inventory: 도구 인벤토리
            Guides: 가이드
            Service Catalog: 서비스 카탈로그
            Change Management: 변경 관리
            Incident & Troubleshooting: 인시던트 및 문제 해결
            Workflow & Flow Designer: 워크플로우 및 플로우 디자이너
            Portal Development: 포털 개발
  - social:
      cards_layout_options:
        font_family: Roboto
        background_color: "#18181b"
        color: "#fafafa"

extra:
  alternate:
    - name: English
      link: /mfa-servicenow-mcp/
      lang: en
    - name: 한국어
      link: /mfa-servicenow-mcp/ko/
      lang: ko

repo_name: jshsakura/mfa-servicenow-mcp
repo_url: https://github.com/jshsakura/mfa-servicenow-mcp
edit_uri: edit/main/docs/

# Extensions to make the content look professional
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [".."] # To allow including README.md from root
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

# Hooks to rewrite language links for MkDocs site
hooks:
  - hooks/rewrite_links.py

# Navigation structure - mapping to existing docs
nav:
  - Home: index.md
  - Getting Started:
      - Client Setup: docs/CLIENT_SETUP.md
      - Windows Installation: docs/WINDOWS_INSTALL.md
  - Features & Tools:
      - Tool Inventory: docs/TOOL_INVENTORY.md
  - Guides:
      - Service Catalog: docs/catalog.md
      - Change Management: docs/change_management.md
      - Workflow & Flow Designer: docs/workflow_management.md
