site_name: MFA ServiceNow MCP
site_description: MFA-first ServiceNow MCP server for LLMs (Claude, OpenAI, etc.)
site_author: jshsakura
site_url: https://jshsakura.github.io/mfa-servicenow-mcp/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  favicon: assets/favicon.png
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

# Plugins for enhanced beauty and functionality
plugins:
